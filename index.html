    <style>
        :root {
            --comm-primary: #6366f1;
            --comm-primary-hover: #4f46e5;
            --comm-success: #10b981;
            --comm-success-hover: #059669;
            --comm-bg: #090d16;
            --comm-card-bg: #111827;
            --comm-border: #1f2937;
            --comm-text: #f3f4f6;
            --comm-text-secondary: #9ca3af;
            --comm-input-bg: #030712;
        }

        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--comm-bg); margin: 0; padding: 0; color: var(--comm-text); }

        /* --- LOGIN & SIGNUP INTERFACE --- */
        #auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at top right, #1e1b4b, #090d16); padding: 20px; box-sizing: border-box; flex-direction: column; }
        .auth-container { display: flex; max-width: 1000px; width: 100%; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 50px; }
        .auth-left { max-width: 480px; }
        .auth-left h1 { color: #818cf8; font-size: 56px; margin: 0 0 16px 0; font-weight: 800; letter-spacing: -1.5px; background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-left p { font-size: 20px; line-height: 32px; margin: 0; color: var(--comm-text-secondary); font-weight: 400; }

        .auth-card { background: var(--comm-card-bg); border: 1px solid var(--comm-border); padding: 36px 30px; border-radius: 20px; box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7); width: 420px; box-sizing: border-box; text-align: center; backdrop-filter: blur(10px); }
        .auth-input { width: 100%; padding: 14px 18px; margin-bottom: 14px; background: var(--comm-input-bg); border: 1px solid var(--comm-border); border-radius: 12px; box-sizing: border-box; font-size: 15px; color: var(--comm-text); outline: none; transition: all 0.2s ease; }
        .auth-input:focus { border-color: var(--comm-primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15); }
        .auth-input::placeholder { color: #4b5563; }
        
        .auth-btn { width: 100%; padding: 14px; background: var(--comm-primary); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 12px; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .auth-btn:hover { background: var(--comm-primary-hover); transform: translateY(-1px); }
        
        .auth-signup-btn { background: var(--comm-success); font-size: 15px; width: auto; padding: 12px 28px; margin: 24px auto 0 auto; display: inline-block; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .auth-signup-btn:hover { background: var(--comm-success-hover); transform: translateY(-1px); }

        .divider { border-bottom: 1px solid var(--comm-border); margin: 20px 0; }
        
        .social-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--comm-border); border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; background: #030712; color: var(--comm-text); box-sizing: border-box; transition: all 0.2s ease; }
        .social-btn:hover { background: #1f2937; border-color: #4b5563; }
        .social-btn img { width: 18px; height: 18px; object-fit: contain; }

        /* Language bar */
        .language-selector-bar { margin-top: 50px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; font-size: 13px; color: var(--comm-text-secondary); }
        .language-selector-bar span { cursor: pointer; transition: color 0.2s; }
        .language-selector-bar span:hover { color: var(--comm-text); }
        .language-selector-bar span.active { font-weight: 700; color: #818cf8; }

        /* --- MAIN FEED INTERFACE --- */
        #app-container { display: none; min-height: 100vh; background: var(--comm-bg); }
        
        /* Navbar */
        .comm-header { background: var(--comm-card-bg); border-bottom: 1px solid var(--comm-border); height: 68px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; backdrop-filter: blur(10px); }
        .comm-header-left { display: flex; align-items: center; gap: 12px; }
        .comm-logo { font-size: 24px; font-weight: 800; color: #818cf8; letter-spacing: -0.5px; background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .comm-user-panel { display: flex; align-items: center; gap: 16px; }
        .comm-user-badge { background: var(--comm-input-bg); border: 1px solid var(--comm-border); padding: 8px 18px; border-radius: 30px; font-weight: 500; font-size: 14px; color: var(--comm-text-secondary); }
        .comm-logout-btn { background: #1f2937; border: 1px solid var(--comm-border); padding: 8px 18px; border-radius: 10px; font-weight: 600; cursor: pointer; color: var(--comm-text); transition: all 0.2s; }
        .comm-logout-btn:hover { background: #374151; }

        /* Main Layout */
        .comm-main-layout { display: flex; justify-content: center; padding: 32px 20px; gap: 24px; }
        .comm-feed { width: 100%; max-width: 640px; }

        /* Create Post Box */
        .comm-create-post { background: var(--comm-card-bg); border: 1px solid var(--comm-border); border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .comm-post-input-row { border-bottom: 1px solid var(--comm-border); padding-bottom: 16px; margin-bottom: 16px; }
        .comm-post-input-row textarea { width: 100%; background: transparent; border: none; outline: none; resize: none; font-size: 16px; font-family: inherit; color: var(--comm-text); height: 70px; }
        .comm-post-input-row textarea::placeholder { color: #4b5563; }
        
        .comm-post-actions { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--comm-text-secondary); margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .file-upload-label { cursor: pointer; color: #34d399; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
        .file-upload-label:hover { opacity: 0.8; }
        
        .comm-submit-btn { background: var(--comm-primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .comm-submit-btn:hover { background: var(--comm-primary-hover); transform: translateY(-1px); }

        /* Post Card */
        .comm-post-card { background: var(--comm-card-bg); border: 1px solid var(--comm-border); border-radius: 20px; margin-bottom: 20px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .comm-post-author { font-weight: 700; font-size: 15px; color: var(--comm-text); display: flex; flex-direction: column; }
        .comm-post-time { font-size: 12px; color: var(--comm-text-secondary); font-weight: 400; margin-top: 2px; }
        .comm-post-text { margin: 16px 0; font-size: 15px; line-height: 1.6; word-break: break-word; color: #e5e7eb; }
        
        .comm-post-media img, .comm-post-media video { width: 100%; max-height: 480px; object-fit: cover; border-radius: 14px; margin-top: 12px; border: 1px solid var(--comm-border); }
        .comm-file-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: var(--comm-input-bg); border: 1px solid var(--comm-border); color: #818cf8; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 13px; margin-top: 12px; transition: background 0.2s; }
        .comm-file-link:hover { background: #1f2937; }

        /* Signup Modal */
        #signup-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(6px); z-index: 200; justify-content: center; align-items: center; }
        .signup-box { background: var(--comm-card-bg); border: 1px solid var(--comm-border); width: 420px; padding: 36px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); position: relative; }
        .signup-close { position: absolute; top: 18px; right: 22px; font-size: 24px; cursor: pointer; color: var(--comm-text-secondary); transition: color 0.2s; }
        .signup-close:hover { color: var(--comm-text); }
    </style>
</head>

    <!-- ================= 1. LOGIN / SIGNUP INTERFACE ================= -->
    <div id="auth-wrapper">
        <div class="auth-container">
            <div class="auth-left">
                <h1 id="t-brand-title">community</h1>
                <p id="t-tagline">Connect with friends and the world around you on community.</p>
            </div>
            
            <div class="auth-card">
                <!-- Login Form -->
                <div id="login-form-box">
                    <input type="email" id="login-email" class="auth-input" placeholder="Email or phone number">
                    <input type="password" id="login-password" class="auth-input" placeholder="Password">
                    <button class="auth-btn" id="t-login-btn" onclick="handleLogin()">Log In</button>
                    
                    <div class="divider"></div>
                    
                    <!-- Social Login Buttons with Official Brand Icons -->
                    <button class="social-btn" id="t-google-btn" onclick="loginWithProvider('google')">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo"> Continue with Google
                    </button>
                    <button class="social-btn" id="t-facebook-btn" onclick="loginWithProvider('facebook')">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook logo"> Continue with Facebook
                    </button>
                    <button class="social-btn" id="t-github-btn" onclick="loginWithProvider('github')">
                        <img src="https://github.githubassets.com/favicons/favicon.svg" alt="GitHub logo"> Continue with GitHub
                    </button>
                    <button class="social-btn" id="t-discord-btn" onclick="loginWithProvider('discord')">
                        <img src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt="Discord logo"> Continue with Discord
                    </button>
                    
                    <div class="divider"></div>
                    <button class="auth-btn auth-signup-btn" id="t-create-acc-btn" onclick="openSignupModal()">Create new account</button>
                </div>
            </div>
        </div>

        <!-- Language Selector Footer Bar -->
        <div class="language-selector-bar">
            <span onclick="changeLanguage('en')" id="lang-en" class="active">English</span>
            <span onclick="changeLanguage('vi')" id="lang-vi">Tiếng Việt</span>
            <span onclick="changeLanguage('es')" id="lang-es">Español</span>
            <span onclick="changeLanguage('fr')" id="lang-fr">Français</span>
            <span onclick="changeLanguage('ja')" id="lang-ja">日本語</span>
            <span onclick="changeLanguage('ko')" id="lang-ko">한국어</span>
        </div>
    </div>

    <!-- Sign Up Modal (Email Verification OTP) -->
    <div id="signup-modal">
        <div class="signup-box">
            <span class="signup-close" onclick="closeSignupModal()">&times;</span>
            <h2 id="t-signup-title" style="margin-top:0; color:var(--comm-text);">Sign Up</h2>
            <p id="t-signup-subtitle" style="color:var(--comm-text-secondary); font-size:14px; margin-bottom: 20px;">It's quick and easy.</p>
            <div class="divider" style="margin:10px 0 20px 0;"></div>
            
            <input type="email" id="signup-email" class="auth-input" placeholder="Your email address">
            <input type="password" id="signup-password" class="auth-input" placeholder="New password">
            <p id="t-signup-note" style="font-size:12px; color:var(--comm-text-secondary); margin: -2px 0 16px 0;">* A verification code (OTP) will be sent to your email.</p>
            <button class="auth-btn" id="t-signup-submit" style="background:var(--comm-success);" onclick="handleSignup()">Sign Up & Verify</button>
        </div>
    </div>

    <!-- ================= 2. MAIN FEED INTERFACE ================= -->
    <div id="app-container">
        <!-- Header Navbar -->
        <header class="comm-header">
            <div class="comm-header-left">
                <div class="comm-logo">community</div>
            </div>
            <div class="comm-user-panel">
                <div class="comm-user-badge" id="current-user-email">Loading...</div>
                <button class="comm-logout-btn" id="t-logout-btn" onclick="logout()">Log Out</button>
            </div>
        </header>

        <!-- Main Feed Layout -->
        <div class="comm-main-layout">
            <div class="comm-feed">
                <!-- Create Post Box -->
                <div class="comm-create-post">
                    <div class="comm-post-input-row">
                        <textarea id="post-content" placeholder="What's on your mind?"></textarea>
                    </div>

                    <div class="comm-post-actions">
                        <label class="file-upload-label" id="t-attach-label">
                            📁 Attach photo/file:
                            <input type="file" id="post-file" style="display: none;" accept="image/*,video/*,.pdf,.zip">
                        </label>
                        <span id="file-name-display" style="font-size: 13px; color: var(--comm-text-secondary);">No file chosen</span>
                    </div>

                    <!-- reCAPTCHA -->
                    <div style="margin-bottom: 16px; display: flex; justify-content: center;">
                        <div class="g-recaptcha" data-sitekey="6Ld4y2AtAAAAABbpaYVKvm80BkecZyohkh8MN2mu"></div>
                    </div>

                    <button class="comm-submit-btn" id="t-post-btn" onclick="createPost()">Post</button>
                </div>

                <!-- Feed Container -->
                <div id="feed-container"></div>
            </div>
        </div>
    </div>

        function changeLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.language-selector-bar span').forEach(el => el.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');

            const t = translations[lang];
            document.getElementById('t-brand-title').innerText = t.brandTitle;
            document.getElementById('t-tagline').innerText = t.tagline;
            document.getElementById('login-email').placeholder = t.loginEmailPlaceholder;
            document.getElementById('login-password').placeholder = t.loginPassPlaceholder;
            document.getElementById('t-login-btn').innerText = t.loginBtn;
            
            document.getElementById('t-google-btn').innerHTML = `<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo"> ${t.googleBtn}`;
            document.getElementById('t-facebook-btn').innerHTML = `<img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook logo"> ${t.facebookBtn}`;
            document.getElementById('t-github-btn').innerHTML = `<img src="https://github.githubassets.com/favicons/favicon.svg" alt="GitHub logo"> ${t.githubBtn}`;
            document.getElementById('t-discord-btn').innerHTML = `<img src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" alt="Discord logo"> ${t.discordBtn}`;

            document.getElementById('t-create-acc-btn').innerText = t.createAccBtn;
            document.getElementById('t-signup-title').innerText = t.signupTitle;
            document.getElementById('t-signup-subtitle').innerText = t.signupSubtitle;
            document.getElementById('signup-email').placeholder = t.signupEmailPlaceholder;
            document.getElementById('signup-password').placeholder = t.signupPassPlaceholder;
            document.getElementById('t-signup-note').innerText = t.signupNote;
            document.getElementById('t-signup-submit').innerText = t.signupSubmit;
            document.getElementById('t-logout-btn').innerText = t.logoutBtn;
            document.getElementById('post-content').placeholder = t.postPlaceholder;
            document.getElementById('t-attach-label').childNodes[0].nodeValue = t.attachLabel + " ";
            document.getElementById('t-post-btn').innerText = t.postBtn;
        }

        // --- GỬI THÔNG BÁO LỖI VỀ EMAIL ---
        function reportErrorToEmail(errorMsg, contextInfo) {
            console.error("Error captured:", errorMsg);
            
            emailjs.send("default_service", "template_error_notify", {
                to_email: "lamnguyenkhang67@gmail.com",
                error_message: errorMsg,
                context: contextInfo,
                time: new Date().toLocaleString()
            }).then(function(response) {
                console.log("Error report sent successfully!", response.status, response.text);
            }, function(error) {
                console.error("Failed to send error report email:", error);
            });
        }

        window.onerror = function (msg, url, lineNo, columnNo, error) {
            reportErrorToEmail(`Uncaught Error: ${msg} at ${url}:${lineNo}:${columnNo}`, error ? error.stack : 'No stack trace');
            return false;
        };

        window.onload = async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            handleSession(session);

            _supabase.auth.onAuthStateChange((event, session) => {
                handleSession(session);
            });

            // Display selected file name
            document.getElementById('post-file').addEventListener('change', function() {
                const nameDisplay = document.getElementById('file-name-display');
                if (this.files && this.files[0]) {
                    nameDisplay.innerText = this.files[0].name;
                } else {
                    nameDisplay.innerText = translations[currentLang].noFile;
                }
            });
        };

        function handleSession(session) {
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-wrapper').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('current-user-email').innerText = currentUser.email;
                fetchPosts();
            } else {
                currentUser = null;
                document.getElementById('auth-wrapper').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        }

        // --- AUTHENTICATION LOGIC ---
        async function handleLogin() {
            try {
                const email = document.getElementById('login-email').value.trim();
                const password = document.getElementById('login-password').value.trim();
                if (!email || !password) { alert('Please fill in all fields!'); return; }

                const { error } = await _supabase.auth.signInWithPassword({ email, password });
                if (error) {
                    reportErrorToEmail(error.message, "Login Action Failed");
                    alert('Login failed: ' + error.message);
                }
            } catch (err) {
                reportErrorToEmail(err.message, "Login Exception Catch");
            }
        }

        function openSignupModal() { document.getElementById('signup-modal').style.display = 'flex'; }
        function closeSignupModal() { document.getElementById('signup-modal').style.display = 'none'; }

        async function handleSignup() {
            try {
                const email = document.getElementById('signup-email').value.trim();
                const password = document.getElementById('signup-password').value.trim();
                if (!email || !password) { alert('Please enter both email and password!'); return; }

                const { data, error } = await _supabase.auth.signUp({ email, password });
                if (error) {
                    reportErrorToEmail(error.message, "Signup Action Failed");
                    alert('Sign up failed: ' + error.message);
                } else {
                    alert('Sign up successful! A verification email has been sent to your inbox. Please check your email before logging in.');
                    closeSignupModal();
                }
            } catch (err) {
                reportErrorToEmail(err.message, "Signup Exception Catch");
            }
        }

        async function loginWithProvider(providerName) {
            await _supabase.auth.signInWithOAuth({
                provider: providerName,
                options: { redirectTo: window.location.origin + window.location.pathname }
            });
        }

        async function logout() { await _supabase.auth.signOut(); }

        // --- CREATE POST & UPLOAD FILE ---
        async function createPost() {
            try {
                const content = document.getElementById('post-content').value.trim();
                const fileInput = document.getElementById('post-file');
                const file = fileInput.files[0];

                if (!content && !file) { alert('Please enter content or choose a file!'); return; }

                const recaptchaResponse = grecaptcha.getResponse();
                if (!recaptchaResponse) { alert('Please complete the reCAPTCHA verification!'); return; }

                let fileUrl = null;
                if (file) {
                    const fileName = `${Date.now()}_${file.name}`;
                    const { error: uploadError } = await _supabase.storage.from('post-files').upload(fileName, file);
                    if (uploadError) {
                        reportErrorToEmail(uploadError.message, "Storage File Upload Failed");
                        alert('File upload failed: ' + uploadError.message); 
                        return;
                    }

                    const { data: publicUrlData } = _supabase.storage.from('post-files').getPublicUrl(fileName);
                    fileUrl = publicUrlData.publicUrl;
                }

                const username = currentUser.email.split('@')[0];

                const { error } = await _supabase.from('posts').insert([{ username: username, content: content, media_url: fileUrl }]);
                if (error) {
                    reportErrorToEmail(error.message, "Post Insertion Failed");
                    alert('Failed to create post: ' + error.message);
                } else {
                    document.getElementById('post-content').value = '';
                    fileInput.value = '';
                    document.getElementById('file-name-display').innerText = translations[currentLang].noFile;
                    grecaptcha.reset();
                    fetchPosts();
                }
            } catch (err) {
                reportErrorToEmail(err.message, "Create Post Exception Catch");
            }
        }

        // --- FETCH POSTS REALTIME ---
        async function fetchPosts() {
            const { data, error } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            if (error) {
                reportErrorToEmail(error.message, "Fetch Posts Failed");
                return;
            }

            const feedContainer = document.getElementById('feed-container');
            feedContainer.items = '';
            feedContainer.innerHTML = '';
            if (data) {
                data.forEach(post => {
                    const div = document.createElement('div');
                    div.className = 'comm-post-card';

                    let mediaHtml = '';
                    if (post.media_url) {
                        const ext = post.media_url.split('.').pop().toLowerCase();
                        if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                            mediaHtml = `<div class="comm-post-media"><img src="${post.media_url}" alt="Post image"></div>`;
                        } else if (['mp4', 'webm', 'ogg'].includes(ext)) {
                            mediaHtml = `<div class="comm-post-media"><video controls src="${post.media_url}"></video></div>`;
                        } else {
                            mediaHtml = `<div><a class="comm-file-link" href="${post.media_url}" target="_blank">📥 Download attachment</a></div>`;
                        }
                    }

                    div.innerHTML = `
                        <div class="comm-post-author">
                            ${escapeHtml(post.username)}
                            <span class="comm-post-time">${new Date(post.created_at).toLocaleString()}</span>
                        </div>
                        <div class="comm-post-text">${escapeHtml(post.content || '')}</div>
                        ${mediaHtml}
                    `;
                    feedContainer.appendChild(div);
                });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        _supabase.channel('public:posts')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, () => fetchPosts())
            .subscribe();
    </script>
</body>
</html>
