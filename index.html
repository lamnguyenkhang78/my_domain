<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - Connect with friends and the world</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6Ld4y2AtAAAAABbpaYVKvm80BkecZyohkh8MN2mu"></script>
    <style>
        :root {
            --comm-primary: #6366f1; --comm-primary-hover: #4f46e5;
            --comm-success: #10b981; --comm-success-hover: #059669;
            --comm-bg: #090d16; --comm-card-bg: #111827;
            --comm-border: #1f2937; --comm-text: #f3f4f6;
            --comm-text-secondary: #9ca3af; --comm-input-bg: #030712;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--comm-bg); margin: 0; padding: 0; color: var(--comm-text); }
        
        #welcome-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at top right, #1e1b4b, #090d16); padding: 20px; box-sizing: border-box; flex-direction: column; }
        .welcome-container { display: flex; max-width: 900px; width: 100%; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 50px; }
        .welcome-left { max-width: 480px; }
        .welcome-left h1 { color: #818cf8; font-size: 56px; margin: 0 0 16px 0; font-weight: 800; background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome-left p { font-size: 20px; line-height: 32px; margin: 0; color: var(--comm-text-secondary); }
        .welcome-card { background: var(--comm-card-bg); border: 1px solid var(--comm-border); padding: 36px 30px; border-radius: 20px; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7); width: 380px; text-align: center; }
        .welcome-btn { width: 100%; padding: 14px; background: var(--comm-primary); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 14px; text-decoration: none; display: inline-block; box-sizing: border-box; transition: 0.2s; }
        .welcome-btn:hover { background: var(--comm-primary-hover); }
        .welcome-btn.signup { background: var(--comm-success); }
        .welcome-btn.signup:hover { background: var(--comm-success-hover); }

        /* TỰ TẠO CAPTCHA MODAL */
        #custom-captcha-overlay, #custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(8px); z-index: 99999; justify-content: center; align-items: center; }
        .custom-modal-box { background: var(--comm-card-bg); border: 1px solid var(--comm-border); width: 360px; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8); }
        .captcha-challenge { font-size: 20px; font-weight: bold; color: #818cf8; background: var(--comm-input-bg); padding: 12px; border-radius: 10px; border: 1px dashed var(--comm-border); margin: 15px 0; letter-spacing: 3px; }
        .modal-input { width: 100%; padding: 12px; background: var(--comm-input-bg); border: 1px solid var(--comm-border); border-radius: 10px; color: white; text-align: center; font-size: 18px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .modal-btn { background: var(--comm-primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; }

        .language-selector-bar { margin-top: 50px; display: flex; gap: 20px; justify-content: center; font-size: 13px; color: var(--comm-text-secondary); }
        .language-selector-bar span { cursor: pointer; }
        .language-selector-bar span.active { font-weight: 700; color: #818cf8; }

        #app-container { display: none; min-height: 100vh; }
        .comm-header { background: var(--comm-card-bg); border-bottom: 1px solid var(--comm-border); height: 68px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; position: sticky; top: 0; z-index: 100; }
        .comm-logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .comm-user-panel { display: flex; align-items: center; gap: 16px; }
        .comm-user-badge { background: var(--comm-input-bg); border: 1px solid var(--comm-border); padding: 8px 18px; border-radius: 30px; font-size: 14px; color: var(--comm-text-secondary); }
        .comm-logout-btn { background: #1f2937; border: 1px solid var(--comm-border); padding: 8px 18px; border-radius: 10px; font-weight: 600; cursor: pointer; color: var(--comm-text); }
        
        .comm-main-layout { display: flex; justify-content: center; padding: 32px 20px; }
        .comm-feed { width: 100%; max-width: 640px; }
        .comm-create-post, .comm-post-card { background: var(--comm-card-bg); border: 1px solid var(--comm-border); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
        textarea { width: 100%; background: transparent; border: none; outline: none; resize: none; font-size: 16px; color: var(--comm-text); height: 70px; font-family: inherit; }
        .comm-submit-btn { background: var(--comm-primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        .comm-post-card img, .comm-post-card video { width: 100%; max-height: 480px; object-fit: cover; border-radius: 14px; margin-top: 12px; }
    </style>
</head>
<body>

    <div id="custom-captcha-overlay">
        <div class="custom-modal-box">
            <h3 style="margin-top:0; color:#f3f4f6;" id="t-captcha-title">Bảo mật chống Bot</h3>
            <p style="font-size:13px; color:var(--comm-text-secondary);" id="t-captcha-desc">Hệ thống phát hiện thao tác nhanh bất thường. Nhập mã bên dưới để tiếp tục:</p>
            <div class="captcha-challenge" id="captcha-code-display">7X9K2</div>
            <input type="text" id="captcha-user-input" class="modal-input" placeholder="Nhập lại mã...">
            <button class="modal-btn" onclick="verifyCustomCaptcha()" id="t-captcha-submit">Xác nhận</button>
        </div>
    </div>

    <div id="custom-alert-overlay">
        <div class="custom-modal-box">
            <h3 id="custom-alert-title" style="margin-top:0;">Thông báo</h3>
            <p id="custom-alert-msg" style="color:var(--comm-text-secondary); font-size:14px; margin-bottom:20px;"></p>
            <button class="modal-btn" onclick="closeCustomAlert()">OK</button>
        </div>
    </div>

    <div id="welcome-wrapper" style="display: none;">
        <div class="welcome-container">
            <div class="welcome-left">
                <h1 id="t-brand-title">community</h1>
                <p id="t-tagline">Connect with friends and the world around you on community.</p>
            </div>
            <div class="welcome-card">
                <a href="/login" class="welcome-btn" id="t-go-login">Log In</a>
                <a href="/signup" class="welcome-btn signup" id="t-go-signup">Create new account</a>
            </div>
        </div>
        <div class="language-selector-bar">
            <span onclick="changeLanguage('en')" id="lang-en" class="active">English</span>
            <span onclick="changeLanguage('vi')" id="lang-vi">Tiếng Việt</span>
            <span onclick="changeLanguage('es')" id="lang-es">Español</span>
            <span onclick="changeLanguage('fr')" id="lang-fr">Français</span>
            <span onclick="changeLanguage('ja')" id="lang-ja">日本語</span>
            <span onclick="changeLanguage('ko')" id="lang-ko">한국어</span>
        </div>
    </div>

    <div id="app-container">
        <header class="comm-header">
            <div class="comm-logo">community</div>
            <div class="comm-user-panel">
                <div class="comm-user-badge" id="current-user-email">Loading...</div>
                <button class="comm-logout-btn" onclick="logout()" id="t-logout">Log Out</button>
            </div>
        </header>
        <div class="comm-main-layout">
            <div class="comm-feed">
                <div class="comm-create-post">
                    <textarea id="post-content" placeholder="What's on your mind?"></textarea>
                    <input type="file" id="post-file" style="margin: 10px 0; font-size: 13px;" accept="image/*,video/*">
                    <button class="comm-submit-btn" onclick="createPost()" id="t-post-btn">Post</button>
                </div>
                <div id="feed-container"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA64s-uDWHU3jW3JPaCkk3g6vsItUxG_cM",
            authDomain: "my-domain-2206.firebaseapp.com",
            projectId: "my-domain-2206",
            storageBucket: "my-domain-2206.firebasestorage.app",
            messagingSenderId: "213982728791",
            appId: "1:213982728791:web:64e871cfaeefc9fb75c912"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const _supabase = supabase.createClient('https://udoulctmeuffbmvivlot.supabase.co', 'sb_publishable_TuvhrqcChOpDgOVnHfx62A_SFO2bKaO');

        let currentLang = localStorage.getItem('comm_lang') || 'en';
        let generatedCaptchaCode = "";

        window.showCustomAlert = function(msg, title = "Notice") {
            document.getElementById('custom-alert-title').innerText = title;
            document.getElementById('custom-alert-msg').innerText = msg;
            document.getElementById('custom-alert-overlay').style.display = 'flex';
        }
        window.closeCustomAlert = function() {
            document.getElementById('custom-alert-overlay').style.display = 'none';
        }

        window.triggerCustomCaptcha = function(callbackName) {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            generatedCaptchaCode = Array.from({length: 5}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            document.getElementById('captcha-code-display').innerText = generatedCaptchaCode;
            document.getElementById('captcha-user-input').value = '';
            document.getElementById('custom-captcha-overlay').style.display = 'flex';
            window.pendingCaptchaCallback = callbackName;
        }

        window.verifyCustomCaptcha = function() {
            const val = document.getElementById('captcha-user-input').value.trim();
            if (val.toUpperCase() === generatedCaptchaCode) {
                document.getElementById('custom-captcha-overlay').style.display = 'none';
                if (window.pendingCaptchaCallback) window.pendingCaptchaCallback();
            } else {
                showCustomAlert("Mã xác nhận không đúng, vui lòng thử lại!");
                triggerCustomCaptcha(window.pendingCaptchaCallback);
            }
        }

        const translations = {
            en: { brandTitle: "community", tagline: "Connect with friends and the world around you on community.", goLogin: "Log In", goSignup: "Create new account", logout: "Log Out", postPlaceholder: "What's on your mind?", postBtn: "Post", captchaTitle: "Bot Detection Security", captchaDesc: "Unusual activity detected. Enter code below:", captchaSubmit: "Verify" },
            vi: { brandTitle: "community", tagline: "Giúp bạn kết nối và chia sẻ với mọi người trong cộng đồng của bạn.", goLogin: "Đăng nhập", goSignup: "Tạo tài khoản mới", logout: "Đăng xuất", postPlaceholder: "Bạn đang nghĩ gì thế?", postBtn: "Đăng bài", captchaTitle: "Bảo mật chống Bot", captchaDesc: "Phát hiện thao tác bất thường. Nhập mã xác nhận:", captchaSubmit: "Xác nhận" },
            es: { brandTitle: "community", tagline: "Conéctate con amigos y el mundo que te rodea.", goLogin: "Iniciar sesión", goSignup: "Crear cuenta", logout: "Cerrar sesión", postPlaceholder: "¿Qué estás pensando?", postBtn: "Publicar", captchaTitle: "Seguridad Anti-Bot", captchaDesc: "Actividad inusual. Ingrese el código:", captchaSubmit: "Verificar" },
            fr: { brandTitle: "community", tagline: "Restez en contact avec vos proches.", goLogin: "Se connecter", goSignup: "Créer un compte", logout: "Se déconnecter", postPlaceholder: "Exprimez-vous...", captchaSubmit: "Vérifier", captchaTitle: "Sécurité anti-bot", captchaDesc: "Activité inhabituelle détectée." },
            ja: { brandTitle: "community", tagline: "友達や世界とつながろう。", goLogin: "ログイン", goSignup: "新しいアカウント", logout: "ログアウト", postPlaceholder: "いまどうしてる？", postBtn: "投稿", captchaTitle: "ボット対策", captchaDesc: "不審なアクティビティです。コードを入力:", captchaSubmit: "確認" },
            ko: { brandTitle: "community", tagline: "주변 사람들과 소통하세요.", goLogin: "로그인", goSignup: "새 계정", logout: "로그아웃", postPlaceholder: "무슨 생각을 하고 계신가요?", postBtn: "게시", captchaTitle: "봇 방지 보안", captchaDesc: "비정상적인 활동이 감지되었습니다.", captchaSubmit: "확인" }
        };

        window.changeLanguage = function(lang) {
            currentLang = lang;
            localStorage.setItem('comm_lang', lang);
            updateTexts();
        }

        function updateTexts() {
            document.querySelectorAll('.language-selector-bar span').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById('lang-' + currentLang);
            if(activeEl) activeEl.classList.add('active');
            const t = translations[currentLang] || translations.en;
            if(document.getElementById('t-brand-title')) document.getElementById('t-brand-title').innerText = t.brandTitle;
            if(document.getElementById('t-tagline')) document.getElementById('t-tagline').innerText = t.tagline;
            if(document.getElementById('t-go-login')) document.getElementById('t-go-login').innerText = t.goLogin;
            if(document.getElementById('t-go-signup')) document.getElementById('t-go-signup').innerText = t.goSignup;
            if(document.getElementById('t-logout')) document.getElementById('t-logout').innerText = t.logout;
            if(document.getElementById('post-content')) document.getElementById('post-content').placeholder = t.postPlaceholder;
            if(document.getElementById('t-post-btn')) document.getElementById('t-post-btn').innerText = t.postBtn;
            if(document.getElementById('t-captcha-title')) document.getElementById('t-captcha-title').innerText = t.captchaTitle;
            if(document.getElementById('t-captcha-desc')) document.getElementById('t-captcha-desc').innerText = t.captchaDesc;
            if(document.getElementById('t-captcha-submit')) document.getElementById('t-captcha-submit').innerText = t.captchaSubmit;
        }
        updateTexts();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const anomalyFlag = localStorage.getItem('comm_anomaly_detected');
                if (anomalyFlag === 'true') {
                    localStorage.removeItem('comm_anomaly_detected');
                    signOut(auth).then(() => {
                        showCustomAlert("Tài khoản có hoạt động bất thường, hệ thống đã đăng xuất để bảo mật.");
                        document.getElementById('welcome-wrapper').style.display = 'flex';
                        document.getElementById('app-container').style.display = 'none';
                    });
                    return;
                }
                document.getElementById('welcome-wrapper').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('current-user-email').innerText = user.email || user.displayName || "User";
                fetchPosts();
            } else {
                document.getElementById('welcome-wrapper').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        window.logout = async function() {
            await signOut(auth);
            window.location.href = '/login';
        }

        window.createPost = async function() {
            const content = document.getElementById('post-content').value.trim();
            if(!content) { showCustomAlert("Vui lòng nhập nội dung bài viết!"); return; }
            
            const user = auth.currentUser;
            const username = user.email ? user.email.split('@')[0] : 'user';
            const { error } = await _supabase.from('posts').insert([{ username: username, content: content }]);
            if(error) showCustomAlert(error.message);
            else {
                document.getElementById('post-content').value = '';
                fetchPosts();
            }
        }

        async function fetchPosts() {
            const { data } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('feed-container');
            container.innerHTML = '';
            if(data) {
                data.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'comm-post-card';
                    div.innerHTML = `<strong>${p.username}</strong><p>${p.content}</p>`;
                    container.appendChild(div);
                });
            }
        }
    </script>
</body>
</html>
