<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Web Chat Realtime - Supabase & Firebase</title>
    <!-- Thư viện Supabase JS Client v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #f9f9f9; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-box { height: 300px; border: 1px solid #ddd; background: #fff; overflow-y: scroll; padding: 15px; margin-bottom: 15px; border-radius: 4px; display: flex; flex-direction: column; gap: 8px; }
        .message-item { padding: 8px 12px; background: #f1f0f0; border-radius: 6px; word-break: break-word; }
        .input-group { display: flex; gap: 10px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>

    <h2>Phòng Chat Realtime (GitHub + Supabase + Firebase)</h2>
    <div id="chat-box"></div>
    
    <div class="input-group">
        <input type="text" id="username" placeholder="Tên của bạn..." style="flex: 0.3;">
        <input type="text" id="message" placeholder="Nhập nội dung tin nhắn..." style="flex: 1;" onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Gửi</button>
    </div>

    <!-- Tích hợp Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA64s-uDWHU3jW3JPaCkk3g6vsItUxG_cM",
            authDomain: "my-domain-2206.firebaseapp.com",
            projectId: "my-domain-2206",
            storageBucket: "my-domain-2206.firebasestorage.app",
            messagingSenderId: "213982728791",
            appId: "1:213982728791:web:64e871cfaeefc9fb75c912",
            measurementId: "G-VDGPZXG829"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
    </script>

    <!-- Xử lý logic Supabase Database & Realtime -->
    <script>
        const SUPABASE_URL = 'https://udoulctmeuffbmvivlot.supabase.co';
        const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_TuvhrqcChOpDgOVnHfx62A_SFO2bKaO';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);
        const chatBox = document.getElementById('chat-box');

        async function fetchMessages() {
            const { data, error } = await _supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });
            
            if (error) {
                console.error('Lỗi tải dữ liệu:', error);
                return;
            }

            chatBox.innerHTML = '';
            if (data) {
                data.forEach(msg => displayMessage(msg));
            }
        }

        function displayMessage(msg) {
            const div = document.createElement('div');
            div.className = 'message-item';
            div.innerHTML = `<strong>${escapeHtml(msg.username || "Ẩn danh")}:</strong> ${escapeHtml(msg.text || "")}`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const user = document.getElementById('username').value.trim() || "Ẩn danh";
            const text = document.getElementById('message').value.trim();
            
            if (!text) return;

            const { error } = await _supabase
                .from('messages')
                .insert([{ username: user, text: text }]);

            if (error) {
                alert('Gửi tin nhắn thất bại! Chi tiết: ' + error.message);
                console.error(error);
            } else {
                document.getElementById('message').value = '';
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        _supabase
            .channel('public:messages')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                displayMessage(payload.new);
            })
            .subscribe();

        fetchMessages();
    </script>
</body>
</html>
