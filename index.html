<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community - Connect with friends and the world</title>
    <!-- Supabase JS Client v2 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --comm-primary: #6366f1;
            --comm-primary-hover: #4f46e5;
            --comm-success: #10b981;
            --comm-success-hover: #059669;
            --comm-bg: #090d16;
            --comm-card-bg: #111827;
            --comm-border: #1f2937;
            --comm-text: #f3f4f6;
            --comm-text-secondary: #9ca3af;
            --comm-input-bg: #030712;
        }

        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: var(--comm-bg); margin: 0; padding: 0; color: var(--comm-text); }

        /* --- WELCOME INTERFACE (CHƯA ĐĂNG NHẬP) --- */
        #welcome-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at top right, #1e1b4b, #090d16); padding: 20px; box-sizing: border-box; flex-direction: column; }
        .welcome-container { display: flex; max-width: 900px; width: 100%; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 50px; }
        .welcome-left { max-width: 480px; }
        .welcome-left h1 { color: #818cf8; font-size: 56px; margin: 0 0 16px 0; font-weight: 800; letter-spacing: -1.5px; background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome-left p { font-size: 20px; line-height: 32px; margin: 0; color: var(--comm-text-secondary); font-weight: 400; }

        .welcome-card { background: var(--comm-card-bg); border: 1px solid var(--comm-border); padding: 36px 30px; border-radius: 20px; box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.7); width: 380px; box-sizing: border-box; text-align: center; backdrop-filter: blur(10px); }
        .welcome-btn { width: 100%; padding: 14px; background: var(--comm-primary); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 14px; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); text-decoration: none; display: inline-block; box-sizing: border-box; }
        .welcome-btn:hover { background: var(--comm-primary-hover); transform: translateY(-1px); }
        .welcome-btn.signup { background: var(--comm-success); box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        .welcome-btn.signup:hover { background: var(--comm-success-hover); }

        /* Language bar */
        .language-selector-bar { margin-top: 50px; display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; font-size: 13px; color: var(--comm-text-secondary); }
        .language-selector-bar span { cursor: pointer; transition: color 0.2s; }
        .language-selector-bar span:hover { color: var(--comm-text); }
        .language-selector-bar span.active { font-weight: 700; color: #818cf8; }

        /* --- CUSTOM MODAL ALERT DIALOG --- */
        #custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.85); backdrop-filter: blur(6px); z-index: 9999; justify-content: center; align-items: center; }
        .custom-alert-box { background: var(--comm-card-bg); border: 1px solid var(--comm-border); width: 380px; padding: 30px; border-radius: 20px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); text-align: center; }
        .custom-alert-title { font-size: 18px; font-weight: 700; color: var(--comm-text); margin-bottom: 10px; }
        .custom-alert-msg { font-size: 14px; color: var(--comm-text-secondary); margin-bottom: 24px; line-height: 1.5; word-break: break-word; }
        .custom-alert-btn { background: var(--comm-primary); color: white; border: none; padding: 12px 30px; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); transition: all 0.2s; }
        .custom-alert-btn:hover { background: var(--comm-primary-hover); }

        /* --- MAIN FEED INTERFACE (ĐÃ ĐĂNG NHẬP) --- */
        #app-container { display: none; min-height: 100vh; background: var(--comm-bg); }
        .comm-header { background: var(--comm-card-bg); border-bottom: 1px solid var(--comm-border); height: 68px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; backdrop-filter: blur(10px); }
        .comm-header-left { display: flex; align-items: center; gap: 12px; }
        .comm-logo { font-size: 24px; font-weight: 800; color: #818cf8; letter-spacing: -0.5px; background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .comm-user-panel { display: flex; align-items: center; gap: 16px; }
        .comm-user-badge { background: var(--comm-input-bg); border: 1px solid var(--comm-border); padding: 8px 18px; border-radius: 30px; font-weight: 500; font-size: 14px; color: var(--comm-text-secondary); }
        .comm-logout-btn { background: #1f2937; border: 1px solid var(--comm-border); padding: 8px 18px; border-radius: 10px; font-weight: 600; cursor: pointer; color: var(--comm-text); transition: all 0.2s; }
        .comm-logout-btn:hover { background: #374151; }

        .comm-main-layout { display: flex; justify-content: center; padding: 32px 20px; gap: 24px; }
        .comm-feed { width: 100%; max-width: 640px; }

        .comm-create-post { background: var(--comm-card-bg); border: 1px solid var(--comm-border); border-radius: 20px; padding: 24px; margin-bottom: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .comm-post-input-row { border-bottom: 1px solid var(--comm-border); padding-bottom: 16px; margin-bottom: 16px; }
        .comm-post-input-row textarea { width: 100%; background: transparent; border: none; outline: none; resize: none; font-size: 16px; font-family: inherit; color: var(--comm-text); height: 70px; }
        .comm-post-input-row textarea::placeholder { color: #4b5563; }
        
        .comm-post-actions { display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: var(--comm-text-secondary); margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
        .file-upload-label { cursor: pointer; color: #34d399; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: opacity 0.2s; }
        .file-upload-label:hover { opacity: 0.8; }
        
        .comm-submit-btn { background: var(--comm-primary); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .comm-submit-btn:hover { background: var(--comm-primary-hover); transform: translateY(-1px); }

        .comm-post-card { background: var(--comm-card-bg); border: 1px solid var(--comm-border); border-radius: 20px; margin-bottom: 20px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); }
        .comm-post-author { font-weight: 700; font-size: 15px; color: var(--comm-text); display: flex; flex-direction: column; }
        .comm-post-time { font-size: 12px; color: var(--comm-text-secondary); font-weight: 400; margin-top: 2px; }
        .comm-post-text { margin: 16px 0; font-size: 15px; line-height: 1.6; word-break: break-word; color: #e5e7eb; }
        .comm-post-media img, .comm-post-media video { width: 100%; max-height: 480px; object-fit: cover; border-radius: 14px; margin-top: 12px; border: 1px solid var(--comm-border); }
        .comm-file-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; background: var(--comm-input-bg); border: 1px solid var(--comm-border); color: #818cf8; text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 13px; margin-top: 12px; transition: background 0.2s; }
        .comm-file-link:hover { background: #1f2937; }
    </style>
</head>
<body>

    <!-- CUSTOM ALERT DIALOG -->
    <div id="custom-alert-overlay">
        <div class="custom-alert-box">
            <div class="custom-alert-title" id="custom-alert-title">Notice</div>
            <div class="custom-alert-msg" id="custom-alert-msg">Message here...</div>
            <button class="custom-alert-btn" onclick="closeCustomAlert()">OK</button>
        </div>
    </div>

    <!-- MÀN HÌNH CHƯA ĐĂNG NHẬP (HIỂN THỊ LỰA CHỌN) -->
    <div id="welcome-wrapper" style="display: none;">
        <div class="welcome-container">
            <div class="welcome-left">
                <h1 id="t-brand-title">community</h1>
                <p id="t-tagline">Connect with friends and the world around you on community.</p>
            </div>
            
            <div class="welcome-card">
                <a href="/login" class="welcome-btn" id="t-go-login">Log In</a>
                <a href="/singup" class="welcome-btn signup" id="t-go-signup">Create new account</a>
            </div>
        </div>

        <div class="language-selector-bar">
            <span onclick="changeLanguage('en')" id="lang-en" class="active">English</span>
            <span onclick="changeLanguage('vi')" id="lang-vi">Tiếng Việt</span>
            <span onclick="changeLanguage('es')" id="lang-es">Español</span>
            <span onclick="changeLanguage('fr')" id="lang-fr">Français</span>
            <span onclick="changeLanguage('ja')" id="lang-ja">日本語</span>
            <span onclick="changeLanguage('ko')" id="lang-ko">한국어</span>
        </div>
    </div>

    <!-- MÀN HÌNH CHÍNH (ĐÃ ĐĂNG NHẬP) -->
    <div id="app-container">
        <header class="comm-header">
            <div class="comm-header-left">
                <div class="comm-logo">community</div>
            </div>
            <div class="comm-user-panel">
                <div class="comm-user-badge" id="current-user-email">Loading...</div>
                <button class="comm-logout-btn" id="t-logout-btn" onclick="logout()">Log Out</button>
            </div>
        </header>

        <div class="comm-main-layout">
            <div class="comm-feed">
                <div class="comm-create-post">
                    <div class="comm-post-input-row">
                        <textarea id="post-content" placeholder="What's on your mind?"></textarea>
                    </div>

                    <div class="comm-post-actions">
                        <label class="file-upload-label" id="t-attach-label">
                            📁 Attach photo/file:
                            <input type="file" id="post-file" style="display: none;" accept="image/*,video/*,.pdf,.zip">
                        </label>
                        <span id="file-name-display" style="font-size: 13px; color: var(--comm-text-secondary);">No file chosen</span>
                    </div>

                    <button class="comm-submit-btn" id="t-post-btn" onclick="createPost()">Post</button>
                </div>

                <div id="feed-container"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA64s-uDWHU3jW3JPaCkk3g6vsItUxG_cM",
            authDomain: "my-domain-2206.firebaseapp.com",
            projectId: "my-domain-2206",
            storageBucket: "my-domain-2206.firebasestorage.app",
            messagingSenderId: "213982728791",
            appId: "1:213982728791:web:64e871cfaeefc9fb75c912",
            measurementId: "G-VDGPZXG829"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const SUPABASE_URL = 'https://udoulctmeuffbmvivlot.supabase.co';
        const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_TuvhrqcChOpDgOVnHfx62A_SFO2bKaO';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

        let currentLang = localStorage.getItem('comm_lang') || 'en';

        window.showCustomAlert = function(message, title = "Notice") {
            document.getElementById('custom-alert-title').innerText = title;
            document.getElementById('custom-alert-msg').innerText = message;
            document.getElementById('custom-alert-overlay').style.display = 'flex';
        }
        window.closeCustomAlert = function() {
            document.getElementById('custom-alert-overlay').style.display = 'none';
        }

        const translations = {
            en: { brandTitle: "community", tagline: "Connect with friends and the world around you on community.", goLogin: "Log In", goSignup: "Create new account", logoutBtn: "Log Out", postPlaceholder: "What's on your mind?", attachLabel: "📁 Attach photo/file:", noFile: "No file chosen", postBtn: "Post" },
            vi: { brandTitle: "community", tagline: "Giúp bạn kết nối và chia sẻ với mọi người trong cộng đồng của bạn.", goLogin: "Đăng nhập", goSignup: "Tạo tài khoản mới", logoutBtn: "Đăng xuất", postPlaceholder: "Bạn đang nghĩ gì thế?", attachLabel: "📁 Chọn ảnh/file đính kèm:", noFile: "Chưa chọn file nào", postBtn: "Đăng bài" },
            es: { brandTitle: "community", tagline: "Conéctate con amigos y el mundo que te rodea en community.", goLogin: "Iniciar sesión", goSignup: "Crear cuenta nueva", logoutBtn: "Cerrar sesión", postPlaceholder: "¿Qué estás pensando?", attachLabel: "📁 Adjuntar foto/archivo:", noFile: "Ningún archivo seleccionado", postBtn: "Publicar" },
            fr: { brandTitle: "community", tagline: "Community vous permet de rester en contact avec les personnes qui comptent pour vous.", goLogin: "Se connecter", goSignup: "Créer nouveau compte", logoutBtn: "Se déconnecter", postPlaceholder: "Exprimez-vous...", attachLabel: "📁 Joindre une photo/fichier :", noFile: "Aucun fichier choisi", postBtn: "Publier" },
            ja: { brandTitle: "community", tagline: "Communityで友達や同僚、知人-つながりを深めましょう。", goLogin: "ログイン", goSignup: "新しいアカウントを作成", logoutBtn: "ログアウト", postPlaceholder: "いまどうしてる？", attachLabel: "📁 写真/ファイルを添付:", noFile: "ファイルが選択されていません", postBtn: "投稿" },
            ko: { brandTitle: "community", tagline: "Community을 통해 주변 사람들과 함께 소통하세요.", goLogin: "로그인", goSignup: "새 계정 만들기", logoutBtn: "로그아웃", postPlaceholder: "무슨 생각을 하고 계신가요?", attachLabel: "📁 사진/파일 첨부:", noFile: "선택된 파일 없음", postBtn: "게시" }
        };

        window.changeLanguage = function(lang) {
            currentLang = lang;
            localStorage.setItem('comm_lang', lang);
            updateTexts();
        }

        function updateTexts() {
            document.querySelectorAll('.language-selector-bar span').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById('lang-' + currentLang);
            if(activeEl) activeEl.classList.add('active');

            const t = translations[currentLang];
            if(document.getElementById('t-brand-title')) document.getElementById('t-brand-title').innerText = t.brandTitle;
            if(document.getElementById('t-tagline')) document.getElementById('t-tagline').innerText = t.tagline;
            if(document.getElementById('t-go-login')) document.getElementById('t-go-login').innerText = t.goLogin;
            if(document.getElementById('t-go-signup')) document.getElementById('t-go-signup').innerText = t.goSignup;
            if(document.getElementById('t-logout-btn')) document.getElementById('t-logout-btn').innerText = t.logoutBtn;
            if(document.getElementById('post-content')) document.getElementById('post-content').placeholder = t.postPlaceholder;
            if(document.getElementById('t-attach-label')) document.getElementById('t-attach-label').childNodes[0].nodeValue = t.attachLabel + " ";
            if(document.getElementById('file-name-display') && document.getElementById('file-name-display').innerText === translations[currentLang === 'en' ? 'vi' : 'en'].noFile) {
                document.getElementById('file-name-display').innerText = t.noFile;
            }
            if(document.getElementById('t-post-btn')) document.getElementById('t-post-btn').innerText = t.postBtn;
        }

        // Khởi chạy ngôn ngữ ngay khi load
        updateTexts();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Đã đăng nhập -> Vào trang chính
                document.getElementById('welcome-wrapper').style.display = 'none';
                document.getElementById('app-container').style.display = 'block';
                document.getElementById('current-user-email').innerText = user.email || user.displayName || "User";
                fetchPosts();
            } else {
                // Chưa đăng nhập -> Hiện màn hình chào mừng kèm 2 lựa chọn Login / Signup
                document.getElementById('welcome-wrapper').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        window.logout = async function() { 
            await signOut(auth); 
        }

        window.createPost = async function() {
            try {
                const content = document.getElementById('post-content').value.trim();
                const fileInput = document.getElementById('post-file');
                const file = fileInput.files[0];

                if (!content && !file) { showCustomAlert('Please enter content or choose a file!'); return; }

                let fileUrl = null;
                if (file) {
                    const cleanFileName = file.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9.]/g, '_');
                    const fileName = `${Date.now()}_${cleanFileName}`;
                    const { error: uploadError } = await _supabase.storage.from('post-files').upload(fileName, file);
                    if (uploadError) {
                        showCustomAlert('File upload failed: ' + uploadError.message); 
                        return;
                    }
                    const { data: publicUrlData } = _supabase.storage.from('post-files').getPublicUrl(fileName);
                    fileUrl = publicUrlData.publicUrl;
                }

                const user = auth.currentUser;
                const username = user.email ? user.email.split('@')[0] : (user.displayName || 'user');

                const { error } = await _supabase.from('posts').insert([{ username: username, content: content, media_url: fileUrl }]);
                if (error) {
                    showCustomAlert('Failed to create post: ' + error.message);
                } else {
                    document.getElementById('post-content').value = '';
                    fileInput.value = '';
                    document.getElementById('file-name-display').innerText = translations[currentLang].noFile;
                    fetchPosts();
                }
            } catch (err) {
                showCustomAlert('Error: ' + err.message);
            }
        }

        async function fetchPosts() {
            const { data, error } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            if (error) return;

            const feedContainer = document.getElementById('feed-container');
            feedContainer.innerHTML = '';
            if (data) {
                data.forEach(post => {
                    const div = document.createElement('div');
                    div.className = 'comm-post-card';

                    let mediaHtml = '';
                    if (post.media_url) {
                        const ext = post.media_url.split('.').pop().toLowerCase();
                        if (['jpg', 'jpeg', 'png', 'gif', 'webp'].includes(ext)) {
                            mediaHtml = `<div class="comm-post-media"><img src="${post.media_url}" alt="Post image"></div>`;
                        } else if (['mp4', 'webm', 'ogg'].includes(ext)) {
                            mediaHtml = `<div class="comm-post-media"><video controls src="${post.media_url}"></video></div>`;
                        } else {
                            mediaHtml = `<div><a class="comm-file-link" href="${post.media_url}" target="_blank">📥 Download attachment</a></div>`;
                        }
                    }

                    div.innerHTML = `
                        <div class="comm-post-author">
                            ${escapeHtml(post.username)}
                            <span class="comm-post-time">${new Date(post.created_at).toLocaleString()}</span>
                        </div>
                        <div class="comm-post-text">${escapeHtml(post.content || '')}</div>
                        ${mediaHtml}
                    `;
                    feedContainer.appendChild(div);
                });
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        document.getElementById('post-file').addEventListener('change', function() {
            const nameDisplay = document.getElementById('file-name-display');
            if (this.files && this.files[0]) {
                nameDisplay.innerText = this.files[0].name;
            } else {
                nameDisplay.innerText = translations[currentLang].noFile;
            }
        });
    </script>
</body>
</html>
