<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to Community</title>
    <script src="https://www.google.com/recaptcha/api.js?render=6Ld4y2AtAAAAABbpaYVKvm80BkecZyohkh8MN2mu"></script>
    <style>
        :root {
            --comm-primary: #6366f1; --comm-primary-hover: #4f46e5;
            --comm-success: #10b981; --comm-bg: #090d16;
            --comm-card-bg: #111827; --comm-border: #1f2937;
            --comm-text: #f3f4f6; --comm-text-secondary: #9ca3af;
            --comm-input-bg: #030712;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--comm-bg); margin: 0; padding: 0; color: var(--comm-text); }
        #auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at top right, #1e1b4b, #090d16); padding: 20px; box-sizing: border-box; flex-direction: column; }
        .auth-container { display: flex; max-width: 900px; width: 100%; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 50px; }
        .auth-left { max-width: 480px; }
        .auth-left h1 { color: #818cf8; font-size: 56px; margin: 0 0 16px 0; font-weight: 800; background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-left p { font-size: 20px; line-height: 32px; margin: 0; color: var(--comm-text-secondary); }
        .auth-card { background: var(--comm-card-bg); border: 1px solid var(--comm-border); padding: 36px 30px; border-radius: 20px; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7); width: 420px; box-sizing: border-box; text-align: center; }
        .auth-input { width: 100%; padding: 14px 18px; margin-bottom: 14px; background: var(--comm-input-bg); border: 1px solid var(--comm-border); border-radius: 12px; font-size: 15px; color: var(--comm-text); outline: none; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 14px; background: var(--comm-primary); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-bottom: 12px; transition: 0.2s; }
        .auth-btn:hover { background: var(--comm-primary-hover); }
        .divider { border-bottom: 1px solid var(--comm-border); margin: 20px 0; }
        .social-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--comm-border); border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; background: #030712; color: var(--comm-text); box-sizing: border-box; }
        
        #custom-captcha-overlay, #custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(8px); z-index: 99999; justify-content: center; align-items: center; }
        .custom-modal-box { background: var(--comm-card-bg); border: 1px solid var(--comm-border); width: 360px; padding: 30px; border-radius: 20px; text-align: center; }
        .captcha-challenge { font-size: 20px; font-weight: bold; color: #818cf8; background: var(--comm-input-bg); padding: 12px; border-radius: 10px; border: 1px dashed var(--comm-border); margin: 15px 0; letter-spacing: 3px; }
        .modal-input { width: 100%; padding: 12px; background: var(--comm-input-bg); border: 1px solid var(--comm-border); border-radius: 10px; color: white; text-align: center; font-size: 18px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .modal-btn { background: var(--comm-primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; }

        .language-selector-bar { margin-top: 50px; display: flex; gap: 20px; justify-content: center; font-size: 13px; color: var(--comm-text-secondary); }
        .language-selector-bar span { cursor: pointer; }
        .language-selector-bar span.active { font-weight: 700; color: #818cf8; }
    </style>
</head>
<body>

    <div id="custom-captcha-overlay">
        <div class="custom-modal-box">
            <h3 style="margin-top:0; color:#f3f4f6;" id="t-cap-title">Bảo mật chống Bot</h3>
            <p style="font-size:13px; color:var(--comm-text-secondary);" id="t-cap-desc">Nhập mã xác nhận bên dưới để đăng nhập:</p>
            <div class="captcha-challenge" id="captcha-code-display"></div>
            <input type="text" id="captcha-user-input" class="modal-input" placeholder="Mã xác nhận...">
            <button class="modal-btn" onclick="verifyCustomCaptcha()" id="t-cap-btn">Xác nhận</button>
        </div>
    </div>

    <div id="custom-alert-overlay">
        <div class="custom-modal-box">
            <h3 id="custom-alert-title" style="margin-top:0;">Thông báo</h3>
            <p id="custom-alert-msg" style="color:var(--comm-text-secondary); font-size:14px; margin-bottom:20px;"></p>
            <button class="modal-btn" onclick="closeCustomAlert()">OK</button>
        </div>
    </div>

    <div id="auth-wrapper">
        <div class="auth-container">
            <div class="auth-left">
                <h1 id="t-brand-title">community</h1>
                <p id="t-tagline">Connect with friends and the world around you on community.</p>
            </div>
            <div class="auth-card">
                <input type="email" id="login-email" class="auth-input" placeholder="Email">
                <input type="password" id="login-password" class="auth-input" placeholder="Password">
                <button class="auth-btn" id="t-login-btn" onclick="handleLoginClick()">Log In</button>
                <div class="divider"></div>
                <button class="social-btn" onclick="loginWithProvider('google')"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Continue with Google</button>
                <button class="social-btn" onclick="loginWithProvider('github')">Continue with GitHub</button>
                <div class="divider"></div>
                <a href="/singup" class="auth-btn" style="background:var(--comm-success); display:block; text-decoration:none; box-sizing:border-box;" id="t-create-acc">Create new account</a>
            </div>
        </div>
        <div class="language-selector-bar">
            <span onclick="changeLanguage('en')" id="lang-en" class="active">English</span>
            <span onclick="changeLanguage('vi')" id="lang-vi">Tiếng Việt</span>
            <span onclick="changeLanguage('es')" id="lang-es">Español</span>
            <span onclick="changeLanguage('fr')" id="lang-fr">Français</span>
            <span onclick="changeLanguage('ja')" id="lang-ja">日本語</span>
            <span onclick="changeLanguage('ko')" id="lang-ko">한국어</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, GithubAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA64s-uDWHU3jW3JPaCkk3g6vsItUxG_cM",
            authDomain: "my-domain-2206.firebaseapp.com",
            projectId: "my-domain-2206",
            storageBucket: "my-domain-2206.firebasestorage.app",
            messagingSenderId: "213982728791",
            appId: "1:213982728791:web:64e871cfaeefc9fb75c912"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentLang = localStorage.getItem('comm_lang') || 'en';
        let generatedCaptchaCode = "";

        window.showCustomAlert = function(msg, title = "Notice") {
            document.getElementById('custom-alert-title').innerText = title;
            document.getElementById('custom-alert-msg').innerText = msg;
            document.getElementById('custom-alert-overlay').style.display = 'flex';
        }
        window.closeCustomAlert = function() {
            document.getElementById('custom-alert-overlay').style.display = 'none';
        }

        window.triggerCustomCaptcha = function(callbackName) {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            generatedCaptchaCode = Array.from({length: 5}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            document.getElementById('captcha-code-display').innerText = generatedCaptchaCode;
            document.getElementById('captcha-user-input').value = '';
            document.getElementById('custom-captcha-overlay').style.display = 'flex';
            window.pendingCaptchaCallback = callbackName;
        }

        window.verifyCustomCaptcha = function() {
            const val = document.getElementById('captcha-user-input').value.trim();
            if (val.toUpperCase() === generatedCaptchaCode) {
                document.getElementById('custom-captcha-overlay').style.display = 'none';
                if (window.pendingCaptchaCallback) window.pendingCaptchaCallback();
            } else {
                showCustomAlert("Mã xác nhận không đúng!");
                triggerCustomCaptcha(window.pendingCaptchaCallback);
            }
        }

        const translations = {
            en: { brandTitle: "community", tagline: "Connect with friends and the world around you on community.", emailPl: "Email", passPl: "Password", loginBtn: "Log In", createAcc: "Create new account", capTitle: "Bot Security", capDesc: "Enter code below:", capBtn: "Verify" },
            vi: { brandTitle: "community", tagline: "Giúp bạn kết nối và chia sẻ với mọi người trong cộng đồng của bạn.", emailPl: "Email", passPl: "Mật khẩu", loginBtn: "Đăng nhập", createAcc: "Tạo tài khoản mới", capTitle: "Bảo mật chống Bot", capDesc: "Nhập mã xác nhận:", capBtn: "Xác nhận" },
            es: { brandTitle: "community", tagline: "Conéctate con amigos y el mundo.", emailPl: "Correo electrónico", passPl: "Contraseña", loginBtn: "Iniciar sesión", createAcc: "Crear cuenta", capTitle: "Seguridad Anti-Bot", capDesc: "Ingrese el código:", capBtn: "Verificar" },
            fr: { brandTitle: "community", tagline: "Restez en contact avec vos proches.", emailPl: "E-mail", passPl: "Mot de passe", loginBtn: "Se connecter", createAcc: "Créer un compte", capTitle: "Sécurité", capDesc: "Code:", capBtn: "Vérifier" },
            ja: { brandTitle: "community", tagline: "友達や世界とつながろう。", emailPl: "メール", passPl: "パスワード", loginBtn: "ログイン", createAcc: "アカウント作成", capTitle: "ボット対策", capDesc: "コード入力:", capBtn: "確認" },
            ko: { brandTitle: "community", tagline: "소통하세요.", emailPl: "이메일", passPl: "비밀번호", loginBtn: "로그인", createAcc: "계정 만들기", capTitle: "봇 방지", capDesc: "코드 입력:", capBtn: "확인" }
        };

        window.changeLanguage = function(lang) {
            currentLang = lang;
            localStorage.setItem('comm_lang', lang);
            updateTexts();
        }

        function updateTexts() {
            document.querySelectorAll('.language-selector-bar span').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById('lang-' + currentLang);
            if(activeEl) activeEl.classList.add('active');
            const t = translations[currentLang] || translations.en;
            document.getElementById('t-brand-title').innerText = t.brandTitle;
            document.getElementById('t-tagline').innerText = t.tagline;
            document.getElementById('login-email').placeholder = t.emailPl;
            document.getElementById('login-password').placeholder = t.passPl;
            document.getElementById('t-login-btn').innerText = t.loginBtn;
            document.getElementById('t-create-acc').innerText = t.createAcc;
            document.getElementById('t-cap-title').innerText = t.capTitle;
            document.getElementById('t-cap-desc').innerText = t.capDesc;
            document.getElementById('t-cap-btn').innerText = t.capBtn;
        }
        updateTexts();

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = '/';
        });

        window.handleLoginClick = function() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();
            if(!email || !password) { showCustomAlert("Vui lòng điền đầy đủ thông tin!"); return; }
            
            // Bật custom captcha bắt buộc xác minh trước khi đăng nhập
            triggerCustomCaptcha(async () => {
                try {
                    await signInWithEmailAndPassword(auth, email, password);
                    window.location.href = '/';
                } catch(err) {
                    showCustomAlert("Đăng nhập thất bại: " + err.message);
                }
            });
        }

        window.loginWithProvider = async function(name) {
            const provider = name === 'google' ? new GoogleAuthProvider() : new GithubAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                window.location.href = '/';
            } catch(err) {
                showCustomAlert("Lỗi xác thực: " + err.message);
            }
        }
    </script>
</body>
</html>
