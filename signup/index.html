<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up for Community</title>
    <script src="https://www.google.com/recaptcha/api.js?render=6Ld4y2AtAAAAABbpaYVKvm80BkecZyohkh8MN2mu"></script>
    <style>
        :root {
            --comm-primary: #6366f1; --comm-primary-hover: #4f46e5;
            --comm-success: #10b981; --comm-success-hover: #059669;
            --comm-bg: #090d16; --comm-card-bg: #111827;
            --comm-border: #1f2937; --comm-text: #f3f4f6;
            --comm-text-secondary: #9ca3af; --comm-input-bg: #030712;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--comm-bg); margin: 0; padding: 0; color: var(--comm-text); }
        #auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: radial-gradient(circle at top right, #1e1b4b, #090d16); padding: 20px; box-sizing: border-box; flex-direction: column; }
        .auth-container { display: flex; max-width: 900px; width: 100%; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 50px; }
        .auth-left { max-width: 480px; }
        .auth-left h1 { color: #818cf8; font-size: 56px; margin: 0 0 16px 0; font-weight: 800; background: linear-gradient(135deg, #818cf8 0%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-left p { font-size: 20px; line-height: 32px; margin: 0; color: var(--comm-text-secondary); }
        .auth-card { background: var(--comm-card-bg); border: 1px solid var(--comm-border); padding: 36px 30px; border-radius: 20px; box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7); width: 420px; box-sizing: border-box; text-align: left; }
        .auth-input { width: 100%; padding: 14px 18px; margin-bottom: 14px; background: var(--comm-input-bg); border: 1px solid var(--comm-border); border-radius: 12px; font-size: 15px; color: var(--comm-text); outline: none; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 14px; background: var(--comm-success); color: white; border: none; border-radius: 12px; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 6px; transition: 0.2s; box-sizing: border-box; }
        .auth-btn:hover { background: var(--comm-success-hover); }
        .divider { border-bottom: 1px solid var(--comm-border); margin: 20px 0; }
        .social-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--comm-border); border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; background: #030712; color: var(--comm-text); box-sizing: border-box; }

        #custom-captcha-overlay, #custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(8px); z-index: 99999; justify-content: center; align-items: center; }
        .custom-modal-box { background: var(--comm-card-bg); border: 1px solid var(--comm-border); width: 360px; padding: 30px; border-radius: 20px; text-align: center; }
        .captcha-challenge { font-size: 20px; font-weight: bold; color: #818cf8; background: var(--comm-input-bg); padding: 12px; border-radius: 10px; border: 1px dashed var(--comm-border); margin: 15px 0; letter-spacing: 3px; }
        .modal-input { width: 100%; padding: 12px; background: var(--comm-input-bg); border: 1px solid var(--comm-border); border-radius: 10px; color: white; text-align: center; font-size: 18px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .modal-btn { background: var(--comm-primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; }

        .language-selector-bar { margin-top: 50px; display: flex; gap: 20px; justify-content: center; font-size: 13px; color: var(--comm-text-secondary); }
        .language-selector-bar span { cursor: pointer; }
        .language-selector-bar span.active { font-weight: 700; color: #818cf8; }
    </style>
</head>
<body>

    <!-- MODAL CUSTOM CAPTCHA -->
    <div id="custom-captcha-overlay">
        <div class="custom-modal-box">
            <h3 style="margin-top:0; color:#f3f4f6;" id="t-cap-title">Bảo mật chống Bot</h3>
            <p style="font-size:13px; color:var(--comm-text-secondary);" id="t-cap-desc">Nhập mã xác nhận để tiếp tục đăng ký:</p>
            <div class="captcha-challenge" id="captcha-code-display"></div>
            <input type="text" id="captcha-user-input" class="modal-input" placeholder="Mã...">
            <button class="modal-btn" onclick="verifyCustomCaptcha()" id="t-cap-btn">Xác nhận</button>
        </div>
    </div>

    <!-- MODAL NHẬP MÃ OTP QUA EMAIL -->
    <div id="otp-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(3,7,18,0.9); z-index:9999; justify-content:center; align-items:center;">
        <div class="custom-modal-box">
            <h3 style="margin-top:0; color:white;" id="t-otp-title">Xác thực Email</h3>
            <p style="font-size:13px; color:var(--comm-text-secondary);" id="t-otp-desc">Mã xác minh 6 số đã được gửi tới email của bạn.</p>
            <input type="text" id="otp-input-code" class="modal-input" placeholder="Nhập mã OTP..." maxlength="6">
            <button class="modal-btn" onclick="verifyOtpCode()" id="t-otp-btn">Xác thực & Hoàn tất</button>
        </div>
    </div>

    <div id="custom-alert-overlay">
        <div class="custom-modal-box">
            <h3 id="custom-alert-title" style="margin-top:0;">Thông báo</h3>
            <p id="custom-alert-msg" style="color:var(--comm-text-secondary); font-size:14px; margin-bottom:20px;"></p>
            <button class="modal-btn" onclick="closeCustomAlert()">OK</button>
        </div>
    </div>

    <div id="auth-wrapper">
        <div class="auth-container">
            <div class="auth-left">
                <h1 id="t-brand-title">community</h1>
                <p id="t-tagline">Connect with friends and the world around you on community.</p>
            </div>
            
            <div class="auth-card">
                <h2 id="t-signup-heading" style="margin-top:0; text-align:center;">Sign Up</h2>
                <div class="divider" style="margin:10px 0 20px 0;"></div>
                
                <input type="email" id="signup-email" class="auth-input" placeholder="Your email address">
                <input type="password" id="signup-password" class="auth-input" placeholder="New password">
                <button class="auth-btn" id="t-signup-submit" onclick="handleSignupClick()">Sign Up</button>
                
                <div class="divider"></div>
                <button class="social-btn" onclick="socialSignup('google')"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Sign up with Google</button>
                <button class="social-btn" onclick="socialSignup('github')">Sign up with GitHub</button>
                <button class="social-btn" onclick="socialSignup('facebook')">Sign up with Facebook</button>
                <button class="social-btn" onclick="socialSignup('discord')">Sign up with Discord</button>
            </div>
        </div>

        <div class="language-selector-bar">
            <span onclick="changeLanguage('en')" id="lang-en" class="active">English</span>
            <span onclick="changeLanguage('vi')" id="lang-vi">Tiếng Việt</span>
            <span onclick="changeLanguage('es')" id="lang-es">Español</span>
            <span onclick="changeLanguage('fr')" id="lang-fr">Français</span>
            <span onclick="changeLanguage('ja')" id="lang-ja">日本語</span>
            <span onclick="changeLanguage('ko')" id="lang-ko">한국어</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, GoogleAuthProvider, GithubAuthProvider, OAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA64s-uDWHU3jW3JPaCkk3g6vsItUxG_cM",
            authDomain: "my-domain-2206.firebaseapp.com",
            projectId: "my-domain-2206",
            storageBucket: "my-domain-2206.firebasestorage.app",
            messagingSenderId: "213982728791",
            appId: "1:213982728791:web:64e871cfaeefc9fb75c912"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentLang = localStorage.getItem('comm_lang') || 'en';
        let generatedCaptchaCode = "";
        let generatedServerOtp = "";
        let pendingEmail = "";
        let pendingPassword = "";

        window.showCustomAlert = function(msg, title = "Notice") {
            document.getElementById('custom-alert-title').innerText = title;
            document.getElementById('custom-alert-msg').innerText = msg;
            document.getElementById('custom-alert-overlay').style.display = 'flex';
        }
        window.closeCustomAlert = function() {
            document.getElementById('custom-alert-overlay').style.display = 'none';
        }

        window.triggerCustomCaptcha = function(callbackName) {
            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
            generatedCaptchaCode = Array.from({length: 5}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            document.getElementById('captcha-code-display').innerText = generatedCaptchaCode;
            document.getElementById('captcha-user-input').value = '';
            document.getElementById('custom-captcha-overlay').style.display = 'flex';
            window.pendingCaptchaCallback = callbackName;
        }

        window.verifyCustomCaptcha = function() {
            const val = document.getElementById('captcha-user-input').value.trim();
            if (val.toUpperCase() === generatedCaptchaCode) {
                document.getElementById('custom-captcha-overlay').style.display = 'none';
                if (window.pendingCaptchaCallback) window.pendingCaptchaCallback();
            } else {
                showCustomAlert("Mã xác nhận không đúng!");
                triggerCustomCaptcha(window.pendingCaptchaCallback);
            }
        }

        const translations = {
            en: { brandTitle: "community", tagline: "Connect with friends and the world around you on community.", signupHeading: "Sign Up", emailPl: "Your email address", passPl: "New password", signupBtn: "Sign Up", capTitle: "Bot Security", capDesc: "Enter code below:", capBtn: "Verify", otpTitle: "Email Verification", otpDesc: "Enter the 6-digit verification code sent to your email.", otpBtn: "Verify & Finish" },
            vi: { brandTitle: "community", tagline: "Giúp bạn kết nối và chia sẻ với mọi người trong cộng đồng của bạn.", signupHeading: "Đăng ký", emailPl: "Email của bạn", passPl: "Mật khẩu mới", signupBtn: "Đăng ký", capTitle: "Bảo mật chống Bot", capDesc: "Nhập mã xác nhận:", capBtn: "Xác nhận", otpTitle: "Xác thực Email", otpDesc: "Nhập mã xác minh 6 số đã gửi tới email của bạn.", otpBtn: "Xác thực & Hoàn tất" },
            es: { brandTitle: "community", tagline: "Conéctate con amigos y el mundo.", signupHeading: "Regístrate", emailPl: "Correo electrónico", passPl: "Nueva contraseña", signupBtn: "Registrarse", capTitle: "Seguridad", capDesc: "Código:", capBtn: "Verificar", otpTitle: "Verificación", otpDesc: "Ingrese el código de 6 dígitos.", otpBtn: "Verificar" },
            fr: { brandTitle: "community", tagline: "Restez en contact.", signupHeading: "S'inscrire", emailPl: "E-mail", passPl: "Mot de passe", signupBtn: "S'inscrire", capTitle: "Sécurité", capDesc: "Code:", capBtn: "Vérifier", otpTitle: "Vérification", otpDesc: "Code OTP:", otpBtn: "Vérifier" },
            ja: { brandTitle: "community", tagline: "友達や世界とつながろう。", signupHeading: "アカウント登録", emailPl: "メールアドレス", passPl: "パスワード", signupBtn: "登録", capTitle: "ボット対策", capDesc: "コード入力:", capBtn: "確認", otpTitle: "メール認証", otpDesc: "OTPコードを入力", otpBtn: "確認" },
            ko: { brandTitle: "community", tagline: "소통하세요.", signupHeading: "회원가입", emailPl: "이메일 주소", passPl: "새 비밀번호", signupBtn: "가입", capTitle: "봇 방지", capDesc: "코드 입력:", capBtn: "확인", otpTitle: "이메일 인증", otpDesc: "OTP 입력", otpBtn: "확인" }
        };

        window.changeLanguage = function(lang) {
            currentLang = lang;
            localStorage.setItem('comm_lang', lang);
            updateTexts();
        }

        function updateTexts() {
            document.querySelectorAll('.language-selector-bar span').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById('lang-' + currentLang);
            if(activeEl) activeEl.classList.add('active');
            const t = translations[currentLang] || translations.en;
            document.getElementById('t-brand-title').innerText = t.brandTitle;
            document.getElementById('t-tagline').innerText = t.tagline;
            document.getElementById('t-signup-heading').innerText = t.signupHeading;
            document.getElementById('signup-email').placeholder = t.emailPl;
            document.getElementById('signup-password').placeholder = t.passPl;
            document.getElementById('t-signup-submit').innerText = t.signupBtn;
            document.getElementById('t-cap-title').innerText = t.capTitle;
            document.getElementById('t-cap-desc').innerText = t.capDesc;
            document.getElementById('t-cap-btn').innerText = t.capBtn;
            document.getElementById('t-otp-title').innerText = t.otpTitle;
            document.getElementById('t-otp-desc').innerText = t.otpDesc;
            document.getElementById('t-otp-btn').innerText = t.otpBtn;
        }
        updateTexts();

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.href = '/';
        });

        window.handleSignupClick = function() {
            pendingEmail = document.getElementById('signup-email').value.trim();
            pendingPassword = document.getElementById('signup-password').value.trim();
            if(!pendingEmail || !pendingPassword) { showCustomAlert("Vui lòng nhập đầy đủ email và mật khẩu!"); return; }
            
            // Kích hoạt custom captcha chống bot trước khi gửi mã OTP qua mail
            triggerCustomCaptcha(() => {
                // Tạo mã OTP ngẫu nhiên 6 chữ số
                generatedServerOtp = Math.floor(100000 + Math.random() * 900000).toString();
                // ⚠️ Mô phỏng việc hệ thống gửi email (Thực tế bạn kết nối API backend Nodemailer/Resend để gửi mã `generatedServerOtp` tới `pendingEmail`)
                console.log("Mã OTP gửi đến email " + pendingEmail + " là: " + generatedServerOtp);
                
                // Hiển thị modal nhập mã OTP xác thực
                document.getElementById('otp-modal-overlay').style.display = 'flex';
                showCustomAlert("Mã xác nhận đã được gửi đến email của bạn! (Kiểm tra console log nếu chạy thử nghiệm local)");
            });
        }

        window.verifyOtpCode = async function() {
            const userInputOtp = document.getElementById('otp-input-code').value.trim();
            if (userInputOtp === generatedServerOtp) {
                document.getElementById('otp-modal-overlay').style.display = 'none';
                try {
                    // Tạo tài khoản Firebase chính thức sau khi pass OTP
                    await createUserWithEmailAndPassword(auth, pendingEmail, pendingPassword);
                    window.location.href = '/';
                } catch(err) {
                    showCustomAlert("Lỗi tạo tài khoản: " + err.message);
                }
            } else {
                showCustomAlert("Mã OTP không chính xác, vui lòng kiểm tra lại!");
            }
        }

        window.socialSignup = async function(name) {
            let provider;
            if(name === 'google') provider = new GoogleAuthProvider();
            else if(name === 'github') provider = new GithubAuthProvider();
            else if(name === 'facebook') provider = new GoogleAuthProvider(); // Thay thế cấu hình Provider tương ứng nếu cần
            else if(name === 'discord') provider = new OAuthProvider('discord');

            try {
                await signInWithPopup(auth, provider);
                window.location.href = '/';
            } catch(err) {
                showCustomAlert("Lỗi đăng ký mạng xã hội: " + err.message);
            }
        }
    </script>
</body>
</html>
